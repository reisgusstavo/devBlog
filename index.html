<link rel="stylesheet" href="login.css">
<body class="login-page">

<div class="login-container">

    <!-- LADO ESQUERDO -->
    <div class="login-left">
        <h1>Explore as coisas que <span>você ama</span>.</h1>
        <img src="logo.png" alt="Imagem destaque">
    </div>

    <!-- LADO DIREITO -->
    <div class="login-right">
        <div class="login-box">

            <h2>Entrar no DevBlog</h2>

            <input type="text" id="loginUser" placeholder="Usuário ou email">
            <input type="password" id="loginPass" placeholder="Senha">

            <button onclick="login()">Entrar</button>

            <p class="link">Esqueceu a senha?</p>

            <hr>

            <button class="btn-secundario" onclick="window.location.href='registro.html'">
                Criar nova conta
            </button>

        </div>
    </div>

</div>

</body>
